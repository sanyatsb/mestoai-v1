# [AUDIT-L1] Compose v2 — no top-level `version:` key.
#
# Local dev: `docker compose up postgres redis` is usually enough; run the bot
# via `pnpm dev` on the host so you get HMR.
#
# Production: `docker compose up -d` brings up the full stack incl. Caddy.

services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_started }
    networks: [internal]
    # No published ports — Caddy fronts the bot.

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"   # exposed for local development; remove on prod or bind to 127.0.0.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"   # exposed for local development; remove on prod
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [bot]
    networks: [internal]

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  internal:
